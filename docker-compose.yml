# docker-compose.yml
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pm-api:
    build: ./backend/pm-api
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  finance-api:
    build: ./backend/finance-api
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  fitness-api:
    build: ./backend/fitness-api
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_PM_API_URL: http://pm-api:8002
      NEXT_PUBLIC_FINANCE_API_URL: http://finance-api:8003
      NEXT_PUBLIC_FITNESS_API_URL: http://fitness-api:8001
    depends_on:
      pm-api:
        condition: service_started
      finance-api:
        condition: service_started
      fitness-api:
        condition: service_started
    command: npm run dev

networks:
  default:
    name: digital-world-network
    driver: bridge
